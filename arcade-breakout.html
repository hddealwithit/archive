<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar Breakout</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at top, #7c3aed, #020617 60%); font-family: Inter, Arial, sans-serif; color: #f8fafc; }
    .shell { width: min(92vw, 900px); padding: 24px; border-radius: 28px; background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(168, 85, 247, 0.25); box-shadow: 0 24px 80px rgba(0,0,0,0.4); display: grid; gap: 16px; }
    .row { display: flex; justify-content: space-between; gap: 14px; flex-wrap: wrap; align-items: center; }
    .row h1, .row p { margin: 0; }
    .stats { display: flex; gap: 10px; flex-wrap: wrap; }
    .chip { background: rgba(168, 85, 247, 0.18); border-radius: 999px; padding: 10px 14px; font-weight: 700; }
    canvas { width: min(88vw, 800px); height: min(calc(88vw * 0.625), 500px); background: linear-gradient(180deg, #020617, #111827); border-radius: 22px; border: 1px solid rgba(168,85,247,0.3); justify-self: center; }
    button { justify-self: end; border: 0; border-radius: 16px; padding: 12px 18px; font-weight: 800; color: white; cursor: pointer; background: linear-gradient(135deg, #a855f7, #7c3aed); }
  </style>
</head>
<body>
  <div class="shell">
    <div class="row">
      <div><p>Arcade Hub</p><h1>Solar Breakout</h1></div>
      <div class="stats"><div class="chip">Score: <span id="score">0</span></div><div class="chip">Lives: <span id="lives">3</span></div></div>
    </div>
    <canvas id="game" width="800" height="500"></canvas>
    <button id="restart">Restart match</button>
  </div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    let paddle, ball, bricks, score, lives, leftPressed = false, rightPressed = false, animation;
    const brickRows = 5, brickCols = 10;

    function init() {
      paddle = { width: 140, height: 16, x: canvas.width / 2 - 70, speed: 9 };
      ball = { x: canvas.width / 2, y: canvas.height - 60, dx: 4, dy: -4, r: 10 };
      bricks = Array.from({ length: brickRows }, (_, row) => Array.from({ length: brickCols }, (_, col) => ({ x: 68 + col * 67, y: 60 + row * 34, w: 56, h: 20, alive: true, color: `hsl(${row * 35 + col * 6} 88% 62%)` })));
      score = 0; lives = 3; scoreEl.textContent = score; livesEl.textContent = lives;
      cancelAnimationFrame(animation);
      loop();
    }

    function drawRounded(x, y, w, h, r, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      ctx.fill();
    }

    function update() {
      if (leftPressed) paddle.x -= paddle.speed;
      if (rightPressed) paddle.x += paddle.speed;
      paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, paddle.x));

      ball.x += ball.dx; ball.y += ball.dy;
      if (ball.x < ball.r || ball.x > canvas.width - ball.r) ball.dx *= -1;
      if (ball.y < ball.r) ball.dy *= -1;
      if (ball.y + ball.r >= paddle.height + canvas.height - 24 && ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
        ball.dy = -Math.abs(ball.dy);
        ball.dx = ((ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2)) * 5;
      }
      if (ball.y > canvas.height + 20) {
        lives -= 1; livesEl.textContent = lives;
        if (!lives) { init(); return; }
        ball = { x: canvas.width / 2, y: canvas.height - 60, dx: 4, dy: -4, r: 10 };
      }

      bricks.forEach(row => row.forEach(brick => {
        if (!brick.alive) return;
        if (ball.x > brick.x && ball.x < brick.x + brick.w && ball.y - ball.r < brick.y + brick.h && ball.y + ball.r > brick.y) {
          brick.alive = false;
          ball.dy *= -1;
          score += 100;
          scoreEl.textContent = score;
        }
      }));

      if (bricks.flat().every(brick => !brick.alive)) init();
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
      bg.addColorStop(0, '#020617'); bg.addColorStop(1, '#111827');
      ctx.fillStyle = bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
      bricks.forEach(row => row.forEach(brick => brick.alive && drawRounded(brick.x, brick.y, brick.w, brick.h, 8, brick.color)));
      drawRounded(paddle.x, canvas.height - 24, paddle.width, paddle.height, 10, '#c084fc');
      ctx.beginPath(); ctx.fillStyle = '#fde68a'; ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill();
    }

    function loop() { update(); render(); animation = requestAnimationFrame(loop); }
    document.addEventListener('keydown', e => { if (e.key === 'ArrowLeft') leftPressed = true; if (e.key === 'ArrowRight') rightPressed = true; });
    document.addEventListener('keyup', e => { if (e.key === 'ArrowLeft') leftPressed = false; if (e.key === 'ArrowRight') rightPressed = false; });
    document.getElementById('restart').addEventListener('click', init);
    init();
  </script>
</body>
</html>
