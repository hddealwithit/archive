<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Pairs</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at top, #14b8a6, #022c22 64%); font-family: Inter, Arial, sans-serif; color: #ecfeff; }
    .shell { width: min(94vw, 920px); padding: 24px; border-radius: 30px; background: rgba(15, 23, 42, 0.88); border: 1px solid rgba(45, 212, 191, 0.26); display: grid; gap: 18px; }
    .head { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; align-items: center; }
    .head h1, .head p { margin: 0; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; }
    .card { aspect-ratio: 1 / 1; border: 0; border-radius: 22px; cursor: pointer; font-size: clamp(2rem, 5vw, 3rem); font-weight: 800; color: #082f49; background: linear-gradient(135deg, #99f6e4, #2dd4bf); box-shadow: 0 16px 28px rgba(20,184,166,0.25); }
    .card.hidden { color: transparent; background: linear-gradient(135deg, #0f172a, #1e293b); box-shadow: none; }
    .toolbar { display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap; }
    .chip { background: rgba(45, 212, 191, 0.16); padding: 10px 14px; border-radius: 999px; font-weight: 700; }
    button { border: 0; border-radius: 16px; padding: 12px 18px; cursor: pointer; font-weight: 800; color: white; background: linear-gradient(135deg, #14b8a6, #0f766e); }
    @media (max-width: 680px) { .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
  </style>
</head>
<body>
  <div class="shell">
    <div class="head"><div><p>Puzzle Hub</p><h1>Pixel Pairs</h1></div><p>Flip the deck and match every icon in the fewest moves you can.</p></div>
    <div class="toolbar"><div class="chip">Moves: <span id="moves">0</span></div><button id="restart">Shuffle board</button></div>
    <div id="grid" class="grid"></div>
  </div>
  <script>
    const icons = ['🎮','🧩','🚀','⚡','🌙','🔥','⭐','🎯'];
    const grid = document.getElementById('grid');
    const movesEl = document.getElementById('moves');
    let first = null, lock = false, moves = 0;

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function reset() {
      moves = 0; movesEl.textContent = moves; first = null; lock = false; grid.innerHTML = '';
      shuffle([...icons, ...icons]).forEach(icon => {
        const button = document.createElement('button');
        button.className = 'card hidden';
        button.textContent = icon;
        button.dataset.icon = icon;
        button.addEventListener('click', () => reveal(button));
        grid.appendChild(button);
      });
    }

    function reveal(card) {
      if (lock || !card.classList.contains('hidden')) return;
      card.classList.remove('hidden');
      if (!first) { first = card; return; }
      moves += 1; movesEl.textContent = moves;
      if (first.dataset.icon === card.dataset.icon) {
        first.disabled = true; card.disabled = true; first = null;
        if ([...grid.children].every(c => c.disabled)) setTimeout(() => alert(`Board cleared in ${moves} moves!`), 120);
        return;
      }
      lock = true;
      setTimeout(() => {
        first.classList.add('hidden');
        card.classList.add('hidden');
        first = null; lock = false;
      }, 700);
    }

    document.getElementById('restart').addEventListener('click', reset);
    reset();
  </script>
</body>
</html>
