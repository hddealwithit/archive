<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Charles Darwin Digital Library - University Archive</title>
    <style>
        :root {
            --bg: #f4f1ea;
            --text: #2b2b2b;
            --border: #d1cdc0;
            --sidebar: #e8e4d8;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Georgia', serif; background: var(--bg); overflow: hidden; }

        /* HEADER */
        header { 
            background: #3e3a32; color: white; padding: 15px 30px; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 4px solid #2a2721;
        }
        .about-btn { cursor: pointer; font-weight: bold; text-decoration: none; color: #dcd0b8; font-size: 14px; }

        /* MAIN LAYOUT */
        .wrapper { display: flex; height: calc(100% - 60px); }
        
        /* SIDEBAR NAVIGATION */
        nav { width: 250px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 20px; }
        nav h3 { font-size: 12px; text-transform: uppercase; color: #777; letter-spacing: 1px; }
        nav ul { list-style: none; padding: 0; margin-bottom: 25px; }
        nav li { padding: 8px 0; border-bottom: 1px solid #dcd8cc; font-size: 13px; cursor: pointer; color: #444; }
        nav li:hover { color: #000; text-decoration: underline; }

        /* CONTENT AREA */
        main { flex: 1; padding: 40px; overflow-y: auto; position: relative; background: var(--bg); }
        .article { max-width: 750px; line-height: 1.8; color: var(--text); }
        h1 { font-family: 'Times New Roman', serif; font-size: 28px; border-bottom: 1px solid #ccc; padding-bottom: 10px; }

        /* SECRET SIGNATURE */
        .sig-container { margin-top: 60px; padding-top: 20px; border-top: 1px double #ccc; }
        #secret-sig { cursor: pointer; font-style: italic; color: #8c7b65; user-select: none; transition: opacity 0.3s; }
        #secret-sig:hover { opacity: 0.8; }

        /* HIDDEN OVERLAY (THE HUB) */
        #vault-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000; 
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .v-btn { 
            background: #222; color: #555; border: 1px solid #333; 
            padding: 20px; margin: 10px; width: 200px; text-align: center;
            cursor: pointer; font-family: monospace; border-radius: 4px;
        }
        .v-btn:hover { color: #fff; border-color: #666; }

        /* GAME FRAME */
        #game-window {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 6000; display: none;
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <header>
        <div class="about-btn" onclick="showSection('home')">UNIVERSITY ARCHIVE / BIOGRAPHY: DARWIN, C.</div>
        <div style="font-size: 12px; opacity: 0.6;">Access Level: Public / Guest</div>
    </header>

    <div class="wrapper">
        <nav>
            <h3>Volumes</h3>
            <ul>
                <li onclick="showSection('home')">Introduction</li>
                <li onclick="showSection('early')">Early Education</li>
                <li onclick="showSection('beagle')">The Beagle Voyage</li>
            </ul>
            <h3>Manuscripts</h3>
            <ul>
                <li onclick="showSection('origin')">Origin of Species</li>
                <li onclick="showSection('descent')">The Descent of Man</li>
            </ul>
        </nav>

        <main>
            <div id="content-body" class="article">
                </div>
            
            <div class="sig-container">
                <span id="secret-sig" onclick="handleSigClick()">— Charles Robert Darwin</span>
            </div>
        </main>
    </div>

    <div id="vault-overlay">
        <div class="v-btn" onclick="launch('astra.html')">INIT_ASTRA</div>
        <div class="v-btn" onclick="launch('Hollow Knight.html')">INIT_HOLLOW</div>
        <div style="color: #333; margin-top: 20px; cursor:pointer;" onclick="closeVault()">[ CANCEL ]</div>
    </div>

    <div id="game-window">
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        const content = document.getElementById('content-body');
        const vault = document.getElementById('vault-overlay');
        const gameWin = document.getElementById('game-window');
        const frame = document.getElementById('game-frame');
        
        let sigClicks = 0;

        // Article Data
        const articles = {
            home: `<h1>Biographical Overview</h1><p>Charles Robert Darwin (12 February 1809 – 19 April 1882) was an English naturalist, geologist and biologist, best known for his contributions to evolutionary biology.</p><p>His journey on the HMS Beagle was the defining moment of his career, providing the data that would eventually lead to the theory of natural selection.</p>`,
            early: `<h1>Early Education</h1><p>Darwin spent the summer of 1825 as an apprentice doctor, helping his father treat the poor of Shropshire. He then went to the University of Edinburgh Medical School, but found lectures dull and surgery distressing.</p>`,
            beagle: `<h1>The Voyage of the Beagle</h1><p>The expedition lasted nearly five years. Darwin spent most of that time on land investigating geology and making natural history collections, while the Beagle surveyed and charted coasts.</p>`
        };

        // Initialize first page
        function showSection(id) {
            closeVault();
            gameWin.style.display = 'none';
            frame.src = '';
            content.innerHTML = articles[id] || articles['home'];
        }
        showSection('home');

        // Secret Logic
        function handleSigClick() {
            sigClicks++;
            if (sigClicks >= 3) {
                vault.style.display = 'flex';
                sigClicks = 0;
            }
        }

        function closeVault() {
            vault.style.display = 'none';
        }

        function launch(file) {
            vault.style.display = 'none';
            gameWin.style.display = 'block';
            frame.src = file;
            frame.focus();
        }

        // RIGHT SHIFT CLOAK
        window.addEventListener('keydown', function(e) {
            if (e.code === "ShiftRight") {
                // Instantly go back to a boring article and stop all game activity
                showSection('early'); 
            }
        });
    </script>
</body>
</html>
