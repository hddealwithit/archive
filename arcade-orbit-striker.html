<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit Striker</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at top, #ef4444, #020617 58%); font-family: Inter, Arial, sans-serif; color: #fee2e2; }
    .shell { width: min(94vw, 920px); padding: 24px; border-radius: 28px; background: rgba(15, 23, 42, 0.92); border: 1px solid rgba(248, 113, 113, 0.24); box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42); display: grid; gap: 18px; }
    .row, .controls { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; align-items: center; }
    .chips { display: flex; gap: 10px; flex-wrap: wrap; }
    .chip { padding: 10px 14px; border-radius: 999px; background: rgba(248, 113, 113, 0.15); font-weight: 700; }
    canvas { width: min(88vw, 860px); height: min(calc(88vw * 0.58), 500px); background: linear-gradient(180deg, #020617, #111827); border-radius: 22px; border: 1px solid rgba(248, 113, 113, 0.26); justify-self: center; }
    button { border: 0; border-radius: 16px; padding: 12px 18px; font-weight: 800; color: white; background: linear-gradient(135deg, #fb7185, #dc2626); cursor: pointer; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="row"><div><p>Archive Arcade</p><h1>Orbit Striker</h1></div><div class="chips"><div class="chip">Score: <span id="score">0</span></div><div class="chip">Shields: <span id="lives">3</span></div></div></div>
    <canvas id="game" width="860" height="500"></canvas>
    <div class="controls"><span>Move with ← → and tap space to fire. Stop the drone wave before it reaches your orbit line.</span><button id="restart">Restart defense</button></div>
  </div>
  <script>
    const canvas = document.getElementById('game'), ctx = canvas.getContext('2d'); const scoreEl = document.getElementById('score'), livesEl = document.getElementById('lives');
    let ship, bullets, enemies, score, lives, left = false, right = false, fireCooldown = 0, animation;
    function reset() { ship = { x: canvas.width / 2 - 28, y: canvas.height - 44, w: 56, h: 16, speed: 7 }; bullets = []; enemies = []; score = 0; lives = 3; scoreEl.textContent = '0'; livesEl.textContent = '3'; cancelAnimationFrame(animation); loop(); }
    function spawnEnemy() { enemies.push({ x: 40 + Math.random() * (canvas.width - 80), y: -20, w: 28, h: 28, speed: 1.8 + Math.random() * 1.4 }); }
    function update() { if (Math.random() < 0.03) spawnEnemy(); if (left) ship.x -= ship.speed; if (right) ship.x += ship.speed; ship.x = Math.max(12, Math.min(canvas.width - ship.w - 12, ship.x)); bullets.forEach(b => b.y -= 8); enemies.forEach(e => e.y += e.speed); bullets = bullets.filter(b => b.y > -20); enemies = enemies.filter(e => e.y < canvas.height + 40); fireCooldown = Math.max(0, fireCooldown - 1);
      enemies.forEach((enemy, enemyIndex) => {
        if (enemy.y + enemy.h >= ship.y) { lives -= 1; livesEl.textContent = String(lives); enemies.splice(enemyIndex, 1); if (lives <= 0) setTimeout(reset, 700); }
        bullets.forEach((bullet, bulletIndex) => {
          if (bullet.x < enemy.x + enemy.w && bullet.x + bullet.w > enemy.x && bullet.y < enemy.y + enemy.h && bullet.y + bullet.h > enemy.y) {
            bullets.splice(bulletIndex, 1); enemies.splice(enemyIndex, 1); score += 100; scoreEl.textContent = String(score);
          }
        });
      }); }
    function render() { ctx.fillStyle = '#020617'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.strokeStyle = '#7f1d1d'; ctx.beginPath(); ctx.moveTo(0, ship.y + 26); ctx.lineTo(canvas.width, ship.y + 26); ctx.stroke(); ctx.fillStyle = '#fca5a5'; ctx.fillRect(ship.x, ship.y, ship.w, ship.h); bullets.forEach(b => { ctx.fillStyle = '#fde68a'; ctx.fillRect(b.x, b.y, b.w, b.h); }); enemies.forEach(e => { ctx.fillStyle = '#fb7185'; ctx.fillRect(e.x, e.y, e.w, e.h); ctx.strokeStyle = '#fecdd3'; ctx.strokeRect(e.x, e.y, e.w, e.h); }); }
    function loop() { update(); render(); animation = requestAnimationFrame(loop); }
    document.addEventListener('keydown', e => { if (e.key === 'ArrowLeft') left = true; if (e.key === 'ArrowRight') right = true; if (e.key === ' ' && fireCooldown === 0) { bullets.push({ x: ship.x + ship.w / 2 - 3, y: ship.y - 14, w: 6, h: 16 }); fireCooldown = 12; } });
    document.addEventListener('keyup', e => { if (e.key === 'ArrowLeft') left = false; if (e.key === 'ArrowRight') right = false; });
    document.getElementById('restart').addEventListener('click', reset); reset();
  </script>
</body>
</html>
